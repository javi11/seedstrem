# Example deployment: seedstrem + Prowlarr + Deluge. Deluge writes to
# /downloads; seedstrem reads the same host directory mounted at /data
# (the default path mapping). Prowlarr provides torrent search.
#
# seedstrem speaks Deluge's native daemon RPC directly (not the Web UI),
# which is disabled to remote hosts by default. After first start, open
# Deluge's Web UI (8112), go to Preferences → Daemon, and enable "Allow
# Remote Connections" (and add a non-default account under Preferences →
# Other/Accounts if you don't want to use the default "localclient" one) —
# otherwise seedstrem's connection will be rejected.
services:
  deluge:
    image: lscr.io/linuxserver/deluge:latest
    container_name: deluge
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./deluge-config:/config
      - ./downloads:/downloads
    ports:
      - "8112:8112"          # WebUI
      - "58846:58846"        # Daemon RPC (seedstrem connects here)
      - "6881:6881"          # BitTorrent
      - "6881:6881/udp"
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./prowlarr-config:/config
    ports:
      - "9696:9696"          # WebUI / API
    restart: unless-stopped

  seedstrem:
    build: .
    # Or use a published image instead of build:
    # image: seedstrem:latest
    container_name: seedstrem
    environment:
      - SEEDSTREM_DELUGE_HOST=deluge
      - SEEDSTREM_DELUGE_PORT=58846
      # Deluge auto-creates a "localclient" account with a random password
      # in deluge-config/auth — read that file for the password, or add
      # your own account under Preferences → Other/Accounts and use it
      # here instead.
      - SEEDSTREM_DELUGE_USERNAME=localclient
      - SEEDSTREM_DELUGE_PASSWORD=
      - SEEDSTREM_PROWLARR_URL=http://prowlarr:9696
      # Get the key from Prowlarr → Settings → General, then set it here
      # or in the seedstrem web UI (Settings → Prowlarr).
      - SEEDSTREM_PROWLARR_API_KEY=
      # The address Stremio will reach seedstrem at:
      - SEEDSTREM_SERVER_EXTERNAL_URL=http://192.168.1.10:8080
    volumes:
      - ./seedstrem-config:/config
      - ./downloads:/data     # SAME host dir as Deluge's /downloads
    ports:
      - "8080:8080"
    depends_on:
      - deluge
      - prowlarr
    restart: unless-stopped
