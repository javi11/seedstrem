# Example deployment: seedstrem + Prowlarr + qBittorrent. qBittorrent
# writes to /downloads; seedstrem reads the same host directory mounted
# at /data (the default path mapping). Prowlarr provides torrent search.
services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=8081
    volumes:
      - ./qbittorrent-config:/config
      - ./downloads:/downloads
    ports:
      - "8081:8081"          # WebUI
      - "6881:6881"          # BitTorrent
      - "6881:6881/udp"
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./prowlarr-config:/config
    ports:
      - "9696:9696"          # WebUI / API
    restart: unless-stopped

  seedstrem:
    build: .
    # Or use a published image instead of build:
    # image: seedstrem:latest
    container_name: seedstrem
    environment:
      - SEEDSTREM_QBITTORRENT_URL=http://qbittorrent:8081
      - SEEDSTREM_QBITTORRENT_USERNAME=admin
      - SEEDSTREM_QBITTORRENT_PASSWORD=adminadmin
      - SEEDSTREM_PROWLARR_URL=http://prowlarr:9696
      # Get the key from Prowlarr → Settings → General, then set it here
      # or in the seedstrem web UI (Settings → Prowlarr).
      - SEEDSTREM_PROWLARR_API_KEY=
      # The address Stremio will reach seedstrem at:
      - SEEDSTREM_SERVER_EXTERNAL_URL=http://192.168.1.10:8080
    volumes:
      - ./seedstrem-config:/config
      - ./downloads:/data     # SAME host dir as qBittorrent's /downloads
    ports:
      - "8080:8080"
    depends_on:
      - qbittorrent
      - prowlarr
    restart: unless-stopped
