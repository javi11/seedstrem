# seedstrem configuration. Every key can be overridden with a
# SEEDSTREM_* environment variable (e.g. SEEDSTREM_DELUGE_HOST).
server:
  listen: ":8080"
  # Base URL used to build the Stremio manifest and stream links handed
  # to players. Must be reachable from wherever you run Stremio.
  external_url: "http://localhost:8080"
  # Web UI login password. Generated and logged on first run if empty.
  admin_password: ""

deluge:
  # seedstrem speaks Deluge's native daemon RPC directly (not the Web
  # UI) — the daemon must have "Allow Remote Connections" enabled
  # (Preferences → Daemon in Deluge's Web UI).
  host: "deluge"
  port: 58846
  # Deluge auto-creates a "localclient" account with a random password
  # stored in Deluge's own config dir (the "auth" file); or add your own
  # account under Preferences → Other/Accounts.
  username: "localclient"
  password: ""

prowlarr:
  # Torrent search backend. Leave url empty to configure later in the
  # web UI. Add indexers inside Prowlarr itself.
  url: "http://prowlarr:9696"
  api_key: ""
  # Newznab category ids searched per content type.
  movie_categories: [2000]
  tv_categories: [5000]
  anime_categories: [5070]
  # Restrict searches to specific Prowlarr indexer ids. Empty = search
  # every enabled indexer.
  indexer_ids: []

addon:
  # Which content types the Stremio addon serves.
  enable_movies: true
  enable_series: true
  enable_anime: false

filters:
  # Drop/rank Prowlarr results before offering them as streams.
  min_seeders: 1
  min_size_mb: 0
  max_size_mb: 0 # 0 = unbounded
  max_results: 20

meta:
  # Cinemeta provides titles/years for IMDB ids.
  cinemeta_url: "https://v3-cinemeta.strem.io"
  # How long resolve-on-play waits for Deluge to fetch torrent metadata
  # before answering 503 (players retry).
  metadata_timeout: 60s
  # Optional. Get a free key at https://www.themoviedb.org/settings/api.
  # Lets seedstrem resolve IMDb ids to TMDb ids for indexers that support
  # TmdbId search but not ImdbId; without it, those indexers fall back to
  # free-text search.
  tmdb_api_key: ""

paths:
  # Translate Deluge's paths to paths seedstrem can read.
  # With the bundled docker-compose both containers share one host
  # directory: Deluge mounts it at /downloads, seedstrem at /data.
  mappings:
    - remote: "/downloads"
      local: "/data"

storage:
  database: "/config/seedstrem.db"
  # Also delete the payload files when a torrent is removed via the API.
  delete_files_on_remove: true

stream:
  # How long a stream request waits for missing pieces before answering
  # 503 (players retry). Also the per-read wait budget mid-stream.
  wait_timeout: 60s
  # Max bytes waited-for/read per read cycle.
  read_chunk: 4194304

log:
  level: "info" # debug | info | warn | error
