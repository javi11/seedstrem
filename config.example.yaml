# seedstrem configuration. Every key can be overridden with a
# SEEDSTREM_* environment variable (e.g. SEEDSTREM_QBITTORRENT_URL).
server:
  listen: ":8080"
  # Base URL used to build the Stremio manifest and stream links handed
  # to players. Must be reachable from wherever you run Stremio.
  external_url: "http://localhost:8080"
  # Web UI login password. Generated and logged on first run if empty.
  admin_password: ""

downloader:
  # Which download client seedstrem drives: "qbittorrent" (default) or
  # "deluge". Only the matching section below is used.
  type: "qbittorrent"

qbittorrent:
  # seedstrem talks to qBittorrent's WebUI API — the WebUI must be
  # enabled and reachable at this URL.
  url: "http://qbittorrent:8080"
  username: "admin"
  # The linuxserver image logs a temporary random password on first
  # start; set a permanent one in the qBittorrent WebUI (Tools → Options
  # → Web UI) and put it here.
  password: ""
  # Category applied to the torrents seedstrem adds, so they are
  # distinguishable from other torrents on a shared qBittorrent instance.
  category: "seedstrem"

deluge:
  # Used when downloader.type is "deluge". seedstrem talks to the Deluge
  # 2 daemon's native RPC port (not the web UI). Enable "Allow Remote
  # Connections" in the daemon settings and use an account from Deluge's
  # auth file. For fast seeking, install the bundled Seedstream plugin
  # (see contrib/deluge-seedstream/).
  host: "deluge"
  port: 58846
  username: "localclient"
  password: ""
  # Label applied to the torrents seedstrem adds (requires Deluge's
  # Label plugin; skipped when the plugin is disabled).
  label: "seedstrem"

prowlarr:
  # Torrent search backend. Leave url empty to configure later in the
  # web UI. Add indexers inside Prowlarr itself.
  url: "http://prowlarr:9696"
  api_key: ""
  # Newznab category ids searched per content type.
  movie_categories: [2000]
  tv_categories: [5000]
  anime_categories: [5070]
  # Restrict searches to specific Prowlarr indexer ids. Empty = search
  # every enabled indexer.
  indexer_ids: []

addon:
  # Which content types the Stremio addon serves.
  enable_movies: true
  enable_series: true
  enable_anime: false

filters:
  # Drop/rank Prowlarr results before offering them as streams.
  min_seeders: 1
  min_size_mb: 0
  max_size_mb: 0 # 0 = unbounded
  max_results: 20

meta:
  # Cinemeta provides titles/years for IMDB ids.
  cinemeta_url: "https://v3-cinemeta.strem.io"
  # How long resolve-on-play waits for qBittorrent to fetch torrent
  # metadata before answering 503 (players retry).
  metadata_timeout: 60s
  # Optional. Get a free key at https://www.themoviedb.org/settings/api.
  # Lets seedstrem resolve IMDb ids to TMDb ids for indexers that support
  # TmdbId search but not ImdbId; without it, those indexers fall back to
  # free-text search.
  tmdb_api_key: ""

paths:
  # Translate qBittorrent's paths to paths seedstrem can read.
  # With the bundled docker-compose both containers share one host
  # directory: qBittorrent mounts it at /downloads, seedstrem at /data.
  mappings:
    - remote: "/downloads"
      local: "/data"

storage:
  database: "/config/seedstrem.db"
  # Also delete the payload files when a torrent is removed via the API.
  delete_files_on_remove: true
  # Stop offering NEW streams once the download disk is at least this
  # percent full, and filter out new releases whose size would push usage
  # past it. Already-downloaded and currently-downloading content is never
  # affected. Usage is measured on the first paths.mappings local root.
  # 0 disables the gate.
  max_disk_usage_percent: 0

stream:
  # How long a stream request waits for missing pieces before answering
  # 503 (players retry). Also the per-read wait budget mid-stream.
  wait_timeout: 60s
  # Max bytes waited-for/read per read cycle.
  read_chunk: 4194304

cleanup:
  # How long a completed torrent may seed before it is removed.
  # 0 disables seed-time cleanup.
  seed_time: 72h
  # Download fraction (0..1) a torrent must reach to survive an
  # abandoned/canceled playback session.
  min_progress_for_cancel: 0.05

seeding:
  # Download the whole torrent (played file first, the rest afterwards) so
  # a complete copy is available to seed — better for ratio on private
  # trackers. Set false to download only the played file (less disk, but
  # you seed only that file).
  full: true

log:
  level: "info" # debug | info | warn | error
